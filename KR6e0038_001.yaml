body:
  text: 西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯如是我聞一時佛在王舍城法野菩提道場坐金剛摩尼寶師子之座有菩薩摩訶薩衆周匝圍繞復有十佛剎百千俱胝那由他衆聽佛說法爾時會中有一菩薩摩訶薩名不思議光王即從座起瞻視大會諸菩薩已而白衆言汝諸佛子今當諦聽此娑婆世界滿一大劫較量時分是彼西方極樂世界無量壽佛剎一晝夜佛子彼極樂世界一大劫較量時分是阿儞弭沙世界縛日囉二合娑誐囉鉢囉摩哩那曩如來佛剎一晝夜佛子彼阿儞弭沙世界一大劫較量時分是不退輪光明世界敷蓮花身如來佛剎中一晝夜佛子彼不退輪光明世界一大劫較量時分是無塵世界法王如來佛剎中一晝夜佛子彼無塵世界一大劫較量時分是燈光世界師子如來佛剎中一晝夜佛子彼燈光世界一大劫較量時分是善光世界毗盧遮那如來佛剎中一晝夜佛子彼善光世界一大劫較量時分是難勝世界法敷身如來佛剎中一晝夜佛子彼難勝世界一大劫較量時分是謨賀世界一切通意王如來佛剎中一晝夜佛子彼謨賀世界一大劫較量時分是現圓光世界讚歎如來佛剎中一晝夜佛子如是一切世界依劫算數過十佛剎百千俱胝那由他微塵數劫已有世界名蓮花吉祥彼佛世尊名賢吉祥是彼佛剎中一晝夜佛子彼有菩薩地名普行地行如是無量菩薩行佛子若復有人於此較量一切佛剎功德經受持讀誦為他解說彼人命終十方佛剎恆河沙數諸佛如來悉皆現前滿彼有情一切所願佛說此經已不思議光王菩薩及諸大衆聞佛所說皆大歡喜信受奉行
